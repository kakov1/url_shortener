name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            ninja-build \
            libboost-system-dev \
            libboost-program-options-dev \
            nlohmann-json3-dev \
            libpqxx-dev \
            libgtest-dev \
            libxxhash-dev \
            libhiredis-dev
      - name: Install Redis
        run: |
            git clone --depth 1 https://github.com/sewenew/redis-plus-plus.git \
            && cd redis-plus-plus \
            && mkdir build \
            && cd build \
            && cmake .. \
                -DREDIS_PLUS_PLUS_BUILD_TEST=OFF \
                -DREDIS_PLUS_PLUS_BUILD_SHARED=ON \
                -DREDIS_PLUS_PLUS_BUILD_STATIC=OFF \
            && cmake --build . -j"$(nproc)" \
            && cmake --install . \
            && ldconfig

      - name: Configure project with tests
        run: cmake -S . -B build -G Ninja -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
  docker-compose-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Show container status
        run: docker compose ps

      - name: Show logs if app failed
        run: docker compose logs app postgres

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          docker compose logs app postgres
          exit 1

      - name: Run integration tests
        run: python -m unittest tests/integration/test_http_api.py -v

      - name: Run load tests
        run: pip3 install pytest && pytest tests/load -s

      - name: Show logs on failure
        if: failure()
        run: docker compose logs app postgres

      - name: Stop services
        if: always()
        run: docker compose down -v
